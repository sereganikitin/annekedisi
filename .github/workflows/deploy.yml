name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    # Refresh posts every hour at :00
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Fetch fresh posts from Telegram
        # Hourly schedule → light fetch (5 pages ≈ 50 most recent posts).
        # Manual dispatch → deep fetch (20 pages) so a rebuild can repair
        # the archive if something goes wrong.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npm run fetch
          else
            npm run fetch:deep
          fi
        continue-on-error: true

      - name: Commit refreshed posts.json
        if: github.event_name == 'schedule'
        continue-on-error: true
        run: |
          git config user.name  "annekedisi-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/posts.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh posts $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Build static site
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            ./out/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"
